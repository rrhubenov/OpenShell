apiVersion: apps/v1
kind: Deployment
metadata:
  name: token-issuer
  namespace: default
  labels:
    app: token-issuer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: token-issuer
  template:
    metadata:
      labels:
        app: token-issuer
    spec:
      containers:
        - name: token-issuer
          image: node:22-alpine
          imagePullPolicy: IfNotPresent
          command: ["node", "/demo/token-issuer.js"]
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: ACCESS_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: openshell-spiffe-token-demo
                  key: access-token-secret
            - name: ACCESS_TOKEN_ISSUER
              value: http://token-issuer.default.svc.cluster.local
            - name: SPIRE_JWKS_URI
              value: https://spire-spiffe-oidc-discovery-provider.spire.svc.cluster.local/keys
            - name: SPIRE_ISSUER
              value: https://spire-spiffe-oidc-discovery-provider.spire.svc.cluster.local
            - name: JWT_SVID_AUDIENCE
              value: http://token-issuer.default.svc.cluster.local
            - name: TRUST_DOMAIN_PREFIX
              value: spiffe://openshell.local/openshell/sandbox/
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          volumeMounts:
            - name: scripts
              mountPath: /demo
              readOnly: true
      volumes:
        - name: scripts
          configMap:
            name: openshell-spiffe-token-demo-scripts
---
apiVersion: v1
kind: Service
metadata:
  name: token-issuer
  namespace: default
spec:
  selector:
    app: token-issuer
  ports:
    - name: http
      port: 80
      targetPort: http
---
