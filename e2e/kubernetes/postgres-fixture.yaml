apiVersion: v1
kind: ServiceAccount
metadata:
  name: openshell-e2e-postgres
  labels:
    app.kubernetes.io/name: openshell-e2e-postgres
---
apiVersion: v1
kind: Secret
metadata:
  name: openshell-e2e-postgres-credentials
  labels:
    app.kubernetes.io/name: openshell-e2e-postgres
type: Opaque
stringData:
  password: openshell-e2e-postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openshell-e2e-postgres
  labels:
    app.kubernetes.io/name: openshell-e2e-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: openshell-e2e-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openshell-e2e-postgres
    spec:
      serviceAccountName: openshell-e2e-postgres
      containers:
        - name: postgres
          image: mirror.gcr.io/library/postgres:17.10-alpine3.23@sha256:979c4379dd698aba0b890599a6104e082035f98ef31d9b9291ec22f2b13059ca
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_USER
              value: openshell
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: openshell-e2e-postgres-credentials
                  key: password
            - name: POSTGRES_DB
              value: openshell
          ports:
            - name: postgres
              containerPort: 5432
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - pg_isready -U openshell -d openshell
            initialDelaySeconds: 3
            periodSeconds: 3
            timeoutSeconds: 2
            failureThreshold: 20
---
apiVersion: v1
kind: Service
metadata:
  name: openshell-e2e-postgres
  labels:
    app.kubernetes.io/name: openshell-e2e-postgres
spec:
  selector:
    app.kubernetes.io/name: openshell-e2e-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
